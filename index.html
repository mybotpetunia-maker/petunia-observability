<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Petunia Observability</title><style>body{font-family:system-ui;background:#0b1020;color:#e9eefb;margin:0;padding:18px}.card{background:#141b34;border:1px solid #2a335f;border-radius:12px;padding:14px;margin:10px 0}.muted{opacity:.75}.ok{color:#4ade80}.warn{color:#f59e0b}.err{color:#fb7185}.live{display:flex;gap:8px;align-items:center}.dot{width:9px;height:9px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 0 rgba(74,222,128,.5);animation:pulse 1.8s infinite}.step{padding:8px 10px;border:1px solid #2a335f;border-radius:8px;margin:6px 0}.t{font-size:12px;opacity:.75}.bar{height:8px;background:#232c57;border-radius:99px;overflow:hidden;margin-top:6px}.fill{height:100%;background:#4ade80}.lane{padding:8px 10px;border:1px solid #2a335f;border-radius:8px;margin:6px 0}pre{white-space:pre-wrap}@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.5)}70%{box-shadow:0 0 0 12px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}</style></head><body><h1 style='margin:0'>Petunia Ops</h1><div class='muted' id='updated'>Loading…</div><div class='card'><h3 style='margin:0 0 8px'>Now</h3><div id='now'></div></div><div class='card'><h3 style='margin:0 0 8px'>Active Work (Live)</h3><div class='live'><span class='dot'></span><span class='muted'>updates every 3s</span></div><div id='active'></div></div><div class='card'><h3 style='margin:0 0 8px'>Completed Tasks</h3><div id='completed'></div></div><div class='card'><h3 style='margin:0 0 8px'>Parallel Lanes</h3><div id='lanes'></div></div><div class='card'><h3 style='margin:0 0 8px'>Timeline</h3><pre id='events'></pre></div><script>function esc(s=''){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}function cls(c){return c==='done'?'ok':c==='blocked'?'err':'warn'}async function load(){try{const r=await fetch('./status.json?ts='+Date.now());const d=await r.json();updated.textContent='Last update: '+(d.updatedAt||'n/a');now.innerHTML=`<div><b>Project:</b> ${esc(d.project||'Unspecified')}</div><div><b>Status:</b> <span class='${cls((d.status||'').toLowerCase())}'>${esc(d.status||'Unknown')}</span></div><div><b>Current:</b> ${esc(d.currentTask||'')}</div><div><b>Next:</b> ${esc(d.nextAction||'')}</div><div><b>Blocker:</b> ${esc(d.blocker||'None')}</div>`;const work=(d.activeWork||[]);const activeWork=work.filter(x=>Number(x.progress||0)<100 && (x.state||'').toLowerCase()!=='done');const completedWork=work.filter(x=>Number(x.progress||0)>=100 || (x.state||'').toLowerCase()==='done');active.innerHTML=activeWork.map(x=>{const p=Math.max(0,Math.min(100,Number(x.progress||0)));return `<div class='step'><div><b>${esc(x.step)}</b></div><div class='t'>${esc(x.state||'')} • owner: ${esc(x.owner||'Petunia')} • ETA: ${esc(x.eta||'n/a')}</div><div class='bar'><div class='fill' style='width:${p}%'></div></div><div class='t'>${p}%${x.blocker?` • blocker: ${esc(x.blocker)}`:''}</div></div>`}).join('')||"<div class='muted'>No active steps</div>";completed.innerHTML=completedWork.map(x=>`<div class='step'><div><b>${esc(x.step)}</b></div><div class='t'>done • owner: ${esc(x.owner||'Petunia')}</div></div>`).join('')||"<div class='muted'>No completed tasks yet</div>";lanes.innerHTML=(d.lanes||[]).map(l=>`<div class='lane'><div><b>${esc(l.name)}</b> — <span class='${cls(l.status)}'>${esc(l.status)}</span></div><div class='t'>task: ${esc(l.task||'')}</div><div class='t'>next: ${esc(l.nextAction||'')} • owner: ${esc(l.owner||'Petunia')} • blocker: ${esc(l.blockerOwner||'none')}</div></div>`).join('')||"<div class='muted'>No lanes</div>";events.textContent=(d.events||[]).join('\n');}catch(e){updated.textContent='Failed loading status.json';}}load();setInterval(load,3000);</script></body></html>
