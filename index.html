<style>
/* ── Holograph Design Tokens ── */
:root {
  --bg-base: #080C10;
  --bg-surface: #0F1419;
  --bg-raised: #1E2733;
  --border-subtle: rgba(94,205,216,0.08);
  --border-default: rgba(94,205,216,0.15);
  --text-primary: #E2EBF0;
  --text-secondary: #A8BDC9;
  --text-tertiary: #7A97AE;
  --brand-teal: #5ECDD8;
  --brand-violet: #A991E2;
  --brand-amber: #F0A040;
  --brand-green: #5DB872;
  --status-error: #E05040;
  --font-display: 'Bodoni Moda', serif;
  --font-body: 'IBM Plex Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --radius-md: 6px;
  --radius-lg: 10px;
  --iris-gradient: linear-gradient(135deg, #5ECDD8 0%, #CBEFF2 25%, #E8F4FF 50%, #CDBEF0 75%, #A991E2 100%);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--text-primary);
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Layout ── */
.page { max-width: 960px; margin: 0 auto; padding: 48px 24px 80px; }

/* ── Header ── */
.header { margin-bottom: 48px; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--brand-teal);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: '';
  width: 20px;
  height: 1px;
  background: var(--brand-teal);
}
.title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(1.75rem, 4vw, 2.25rem);
  color: var(--text-primary);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}
.subtitle {
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text-tertiary);
  font-weight: 300;
}

/* ── Status strip ── */
.status-strip {
  display: flex;
  gap: 24px;
  padding: 16px 20px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
}
.stat-val {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 500;
  color: var(--brand-teal);
}
.stat-val.amber { color: var(--brand-amber); }
.stat-val.green { color: var(--brand-green); }
.stat-val.error { color: var(--status-error); }

/* ── Section headers ── */
.section-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-subtle);
}

/* ── Active task card ── */
.active-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-left: 3px solid var(--brand-teal);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  margin-bottom: 12px;
}
.active-card.blocked {
  border-left-color: var(--brand-amber);
}
.active-title {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.active-meta {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.active-desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.5;
}
.blocker-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--brand-amber);
  background: rgba(240,160,64,0.08);
  border: 1px solid rgba(240,160,64,0.2);
  border-radius: 4px;
  padding: 3px 8px;
  margin-top: 8px;
}
.status-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
  display: inline-block;
}
.badge-active {
  color: var(--brand-teal);
  background: rgba(94,205,216,0.1);
  border: 1px solid rgba(94,205,216,0.2);
}
.badge-blocked {
  color: var(--brand-amber);
  background: rgba(240,160,64,0.1);
  border: 1px solid rgba(240,160,64,0.2);
}
.badge-done {
  color: var(--brand-green);
  background: rgba(93,184,114,0.1);
  border: 1px solid rgba(93,184,114,0.2);
}
.badge-failed {
  color: var(--status-error);
  background: rgba(224,80,64,0.1);
  border: 1px solid rgba(224,80,64,0.2);
}
.badge-queued {
  color: var(--text-tertiary);
  background: rgba(122,151,174,0.1);
  border: 1px solid rgba(122,151,174,0.15);
}

/* ── Completed tasks ── */
.completed-list { margin-bottom: 40px; }
.completed-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-subtle);
}
.completed-item:last-child { border-bottom: none; }
.check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: rgba(93,184,114,0.15);
  border: 1px solid rgba(93,184,114,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  color: var(--brand-green);
  font-size: 11px;
}
.completed-title {
  font-size: 14px;
  color: var(--text-secondary);
  flex: 1;
}
.completed-project {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 0.05em;
}
.completed-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── Event log ── */
.event-log { margin-bottom: 40px; }
.event {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  font-size: 13px;
  border-bottom: 1px solid rgba(94,205,216,0.04);
}
.event:last-child { border-bottom: none; }
.event-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  white-space: nowrap;
  min-width: 100px;
  flex-shrink: 0;
}
.event-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 5px;
}
.event-dot.start { background: var(--brand-teal); }
.event-dot.progress { background: var(--brand-violet); }
.event-dot.complete { background: var(--brand-green); }
.event-dot.blocker { background: var(--brand-amber); }
.event-dot.unblock { background: var(--brand-teal); }
.event-dot.fail { background: var(--status-error); }
.event-dot.note { background: var(--text-tertiary); }
.event-msg {
  color: var(--text-secondary);
  flex: 1;
}

/* ── Pulse dot ── */
.pulse {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--brand-teal);
  display: inline-block;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(94,205,216,0.4); }
  50% { box-shadow: 0 0 0 6px rgba(94,205,216,0); }
}

/* ── Iris divider ── */
.iris-divider {
  height: 1px;
  background: var(--iris-gradient);
  opacity: 0.3;
  margin: 32px 0;
}

/* ── Loading state ── */
.loading {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-tertiary);
  padding: 24px 0;
}

/* ── Refresh indicator ── */
.refresh-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 8px 24px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-tertiary);
  z-index: 10;
}

/* ── Mobile ── */
@media (max-width: 640px) {
  .page { padding: 32px 16px 72px; }
  .status-strip { flex-direction: column; gap: 12px; }
  .event { flex-direction: column; gap: 4px; }
  .event-time { min-width: 0; }
  .completed-item { flex-direction: column; gap: 6px; }
  .completed-time { align-self: flex-start; }
}
</style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="eyebrow">Petunia · Observability</div>
    <h1 class="title">What she's working on</h1>
    <p class="subtitle">Real-time visibility into active tasks, blockers, and completions.</p>
  </div>

  <!-- Status strip -->
  <div class="status-strip" id="status-strip">
    <div class="stat">
      <span class="stat-label">Active</span>
      <span class="stat-val" id="count-active">-</span>
    </div>
    <div class="stat">
      <span class="stat-label">Blocked</span>
      <span class="stat-val amber" id="count-blocked">-</span>
    </div>
    <div class="stat">
      <span class="stat-label">Completed</span>
      <span class="stat-val green" id="count-done">-</span>
    </div>
    <div class="stat">
      <span class="stat-label">Failed</span>
      <span class="stat-val error" id="count-failed">-</span>
    </div>
  </div>

  <!-- Active / In Progress -->
  <div class="section-label"><span class="pulse"></span>&ensp;Active right now</div>
  <div id="active-tasks">
    <div class="loading">Loading...</div>
  </div>

  <!-- Blocked -->
  <div id="blocked-section" style="display:none">
    <div class="iris-divider"></div>
    <div class="section-label">Blocked — needs attention</div>
    <div id="blocked-tasks"></div>
  </div>

  <!-- Queued -->
  <div id="queued-section" style="display:none">
    <div class="iris-divider"></div>
    <div class="section-label">Queued</div>
    <div id="queued-tasks"></div>
  </div>

  <div class="iris-divider"></div>

  <!-- Completed -->
  <div class="section-label">Completed</div>
  <div class="completed-list" id="completed-tasks">
    <div class="loading">Loading...</div>
  </div>

  <div class="iris-divider"></div>

  <!-- Event log -->
  <div class="section-label">Event log</div>
  <div class="event-log" id="event-log">
    <div class="loading">Loading...</div>
  </div>

</div>

<!-- Refresh bar -->
<div class="refresh-bar">
  <span class="pulse"></span>
  <span id="last-refresh">Connecting...</span>
</div>

<script>
const SUPABASE_URL = 'https://ryxwlqyrcnpuphvdisoq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5eHdscXlyY25wdXBodmRpc29xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDA1MzIsImV4cCI6MjA4ODIxNjUzMn0.224-CUhlQiIZO769VoptXV5SBshEMCZA5B07JMz0ckQ';

async function query(table, params = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
    }
  });
  return res.json();
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = now - d;
  const mins = Math.floor(diff / 60000);
  const hrs = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  if (hrs < 24) return `${hrs}h ago`;
  return `${days}d ago`;
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

function shortDate(dateStr) {
  const d = new Date(dateStr);
  const month = d.toLocaleDateString('en-US', { month: 'short' });
  const day = d.getDate();
  const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: false });
  return `${month} ${day}, ${time}`;
}

function badgeFor(status) {
  const map = {
    'in_progress': '<span class="status-badge badge-active">in progress</span>',
    'blocked': '<span class="status-badge badge-blocked">blocked</span>',
    'done': '<span class="status-badge badge-done">done</span>',
    'failed': '<span class="status-badge badge-failed">failed</span>',
    'queued': '<span class="status-badge badge-queued">queued</span>',
  };
  return map[status] || status;
}

function renderTaskCard(task) {
  const isBlocked = task.status === 'blocked';
  return `
    <div class="active-card ${isBlocked ? 'blocked' : ''}">
      <div class="active-title">${task.title}</div>
      <div class="active-meta">
        ${badgeFor(task.status)}
        ${task.project ? `<span>${task.project}</span>` : ''}
        ${task.started_at ? `<span>started ${timeAgo(task.started_at)}</span>` : ''}
      </div>
      ${task.description ? `<div class="active-desc">${task.description}</div>` : ''}
      ${task.blocker ? `<div class="blocker-tag">${task.blocker}${task.blocker_owner === 'user' ? ' — needs you' : ''}</div>` : ''}
    </div>
  `;
}

async function refresh() {
  try {
    // Fetch all tasks ordered by updated_at
    const tasks = await query('tasks', 'order=updated_at.desc');

    // Categorize
    const active = tasks.filter(t => t.status === 'in_progress');
    const blocked = tasks.filter(t => t.status === 'blocked');
    const queued = tasks.filter(t => t.status === 'queued');
    const done = tasks.filter(t => t.status === 'done');
    const failed = tasks.filter(t => t.status === 'failed');

    // Stats
    document.getElementById('count-active').textContent = active.length;
    document.getElementById('count-blocked').textContent = blocked.length;
    document.getElementById('count-done').textContent = done.length;
    document.getElementById('count-failed').textContent = failed.length;

    // Active tasks
    const activeEl = document.getElementById('active-tasks');
    if (active.length === 0) {
      activeEl.innerHTML = '<div style="font-family:var(--font-mono);font-size:13px;color:var(--text-tertiary);padding:16px 0">Nothing active. Petunia is idle.</div>';
    } else {
      activeEl.innerHTML = active.map(renderTaskCard).join('');
    }

    // Blocked
    const blockedSection = document.getElementById('blocked-section');
    const blockedEl = document.getElementById('blocked-tasks');
    if (blocked.length > 0) {
      blockedSection.style.display = 'block';
      blockedEl.innerHTML = blocked.map(renderTaskCard).join('');
    } else {
      blockedSection.style.display = 'none';
    }

    // Queued
    const queuedSection = document.getElementById('queued-section');
    const queuedEl = document.getElementById('queued-tasks');
    if (queued.length > 0) {
      queuedSection.style.display = 'block';
      queuedEl.innerHTML = queued.map(renderTaskCard).join('');
    } else {
      queuedSection.style.display = 'none';
    }

    // Completed (most recent first)
    const completedEl = document.getElementById('completed-tasks');
    if (done.length === 0 && failed.length === 0) {
      completedEl.innerHTML = '<div style="font-family:var(--font-mono);font-size:13px;color:var(--text-tertiary);padding:16px 0">Nothing completed yet.</div>';
    } else {
      const sorted = [...done, ...failed].sort((a, b) =>
        new Date(b.completed_at || b.updated_at) - new Date(a.completed_at || a.updated_at)
      );
      completedEl.innerHTML = sorted.map(t => `
        <div class="completed-item">
          <div class="check">${t.status === 'done' ? '&#10003;' : '&#10007;'}</div>
          <div style="flex:1">
            <div class="completed-title">${t.title}</div>
            <div class="completed-project">${t.project || ''}</div>
          </div>
          <div class="completed-time">${t.completed_at ? shortDate(t.completed_at) : ''}</div>
        </div>
      `).join('');
    }

    // Event log (last 30)
    const events = await query('events', 'order=created_at.desc&limit=30');
    const eventEl = document.getElementById('event-log');
    if (events.length === 0) {
      eventEl.innerHTML = '<div style="font-family:var(--font-mono);font-size:13px;color:var(--text-tertiary);padding:16px 0">No events logged yet.</div>';
    } else {
      eventEl.innerHTML = events.map(e => `
        <div class="event">
          <span class="event-time">${shortDate(e.created_at)}</span>
          <span class="event-dot ${e.event_type}"></span>
          <span class="event-msg">${e.message}</span>
        </div>
      `).join('');
    }

    // Update refresh timestamp
    document.getElementById('last-refresh').textContent =
      'Last refreshed ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });

  } catch (err) {
    console.error('Refresh failed:', err);
    document.getElementById('last-refresh').textContent = 'Refresh failed — retrying...';
  }
}

// Initial load + auto-refresh every 30s
refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
