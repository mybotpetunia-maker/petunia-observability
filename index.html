<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Petunia Observability</title><style>body{font-family:system-ui;background:#0b1020;color:#e9eefb;margin:0;padding:20px}.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}.card{background:#141b34;border:1px solid #2a335f;border-radius:12px;padding:14px}.muted{opacity:.75}.ok{color:#4ade80}.warn{color:#f59e0b}.err{color:#fb7185}h1{margin:0 0 12px}pre{white-space:pre-wrap}</style></head><body><h1>Petunia Ops</h1><div class='muted' id='updated'>Loading…</div><div class='grid'><div class='card'><h3>Current Task</h3><div id='task'></div></div><div class='card'><h3>Status</h3><div id='status'></div></div><div class='card'><h3>Blocker</h3><div id='blocker'></div></div><div class='card'><h3>Next Action</h3><div id='next'></div></div></div><div class='card' style='margin-top:12px'><h3>Worklog</h3><pre id='log'></pre></div><script>async function load(){try{const r=await fetch('./status.json?ts='+Date.now());const d=await r.json();updated.textContent='Last update: '+d.updatedAt;task.textContent=d.currentTask;status.innerHTML='<b class="'+(d.statusClass||'')+'">'+d.status+'</b>';blocker.textContent=d.blocker||'None';next.textContent=d.nextAction||'';log.textContent=(d.worklog||[]).join('\n');}catch(e){updated.textContent='Failed loading status.json';}}load();setInterval(load,10000);</script></body></html>
