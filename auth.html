<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0b1020;
      color: #eef3ff;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      background: #141b34;
      border: 1px solid #2a335f;
      border-radius: 12px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .muted {
      color: #9fb0d0;
      margin-bottom: 24px;
    }
    input {
      width: 100%;
      padding: 12px;
      background: #0f1626;
      border: 1px solid #2b3a5c;
      border-radius: 8px;
      color: #d9e6ff;
      font-size: 16px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #1a4b8d;
      border: 1px solid #2f67b3;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #2f67b3;
    }
    .error {
      color: #fb7185;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign In</h1>
    <div class="muted">This subdomain requires authentication</div>
    <div class="error" id="error"></div>
    <form id="authForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Sign In</button>
    </form>
  </div>
  <script>
    const form = document.getElementById('authForm');
    const error = document.getElementById('error');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      error.style.display = 'none';
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Simple auth check (will replace with OAuth)
      if (email === 'mybotpetunia@gmail.com' && password === 'temp123') {
        // Set session cookie
        document.cookie = 'auth-session=valid; path=/; max-age=86400; SameSite=Lax';
        
        // Redirect back
        const params = new URLSearchParams(window.location.search);
        const returnUrl = params.get('return') || '/';
        window.location.href = returnUrl;
      } else {
        error.textContent = 'Invalid credentials';
        error.style.display = 'block';
      }
    });
  </script>
</body>
</html>
