<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0b1020;
      color: #eef3ff;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .card {
      background: #141b34;
      border: 1px solid #2a335f;
      border-radius: 12px;
      padding: 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .muted {
      color: #9fb0d0;
      margin-bottom: 24px;
    }
    .error {
      color: #fb7185;
      margin: 16px 0;
      display: none;
    }
    #buttonDiv {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign In</h1>
    <div class="muted">This subdomain requires authentication</div>
    <div class="error" id="error"></div>
    <div id="buttonDiv"></div>
  </div>
  <script>
    const ALLOWED_EMAILS = ['mybotpetunia@gmail.com'];
    const CLIENT_ID = '463806670722-vq69f9r57pv8bphsotjjnn64hpnr1cvr.apps.googleusercontent.com';
    
    function handleCredentialResponse(response) {
      // Decode JWT to get email
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      const email = payload.email;
      
      // Check allowlist
      if (!ALLOWED_EMAILS.includes(email)) {
        document.getElementById('error').textContent = 'Access denied. Email not authorized.';
        document.getElementById('error').style.display = 'block';
        return;
      }
      
      // Set session cookie with email
      document.cookie = `auth-session=${email}; path=/; max-age=86400; SameSite=Lax`;
      
      // Redirect back
      const params = new URLSearchParams(window.location.search);
      const returnUrl = params.get('return') || '/';
      window.location.href = returnUrl;
    }
    
    window.onload = function () {
      google.accounts.id.initialize({
        client_id: CLIENT_ID,
        callback: handleCredentialResponse
      });
      google.accounts.id.renderButton(
        document.getElementById('buttonDiv'),
        { theme: 'filled_blue', size: 'large', width: 300 }
      );
    };
  </script>
</body>
</html>
